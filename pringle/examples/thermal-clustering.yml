  source: "def get_temperature(k, M, β_0, max_iter, T, eps=0.01):\n\n    β_i = 0.5\
    \ * β_0\n    A = M\n    for i in range(1, max_iter):\n        ## FIND ATTRACTORS\
    \ FOR THIS TEMPERATURE\n        attractors = get_attractors(A, M, β_i, T, eps)\n\
    \        k_i = len(attractors)\n        \n        ## COMPARE TO TARGET NUMBER\
    \ OF ATTRACTORS\n        if k_i == k:\n            break\n        elif k_i > k:\n\
    \            β_i -= 0.5**i * β_0\n        elif k_i < k:\n            β_i += 0.5**i\
    \ * β_0\n            M = A\n    return β_i"
  visible: false
  sub_cells: []
  rng_seed: 1
