  type: equation
  source: "def get_attractors(A, M, β, T, eps=0.001):\n    tails = descend(A.T, M,\
    \ T, β).T\n    # COMPUTE THE GRAD NORMS AT THE END OF EACH DESCENT TRAIL\n   \
    \ grads = norm(dE(M, tails.T, β).T, axis=0)\n    # Cull all points with gradients\
    \ over a curvature threshold. \n    mask = grads < eps\n    candidates = tails[mask]\n\
    \    # QUANTIZE THE REMAINING POINTS \n    bins = np.round(candidates, 2)\n  \
    \  attractors = np.unique(bins, axis=0)\n    #attractors = pd.DataFrame(points).drop_duplicates().numpy()\n\
    \    return attractors "
